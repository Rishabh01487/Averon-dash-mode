<!DOCTYPE html><html><head><title>Averon</title></head><body><div id="ui"></div><div id="enter-btn">Enter</div><script>
var bcG=new THREE.Group();scene.add(bcG);
var BC=7;var bcB=[];
if(!CanvasRenderingContext2D.prototype.roundRect)CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this;};
function mkBlockTex(h,clr){
  var c=document.createElement("canvas");c.width=256;c.height=64;var cx=c.getContext("2d");
  cx.fillStyle="rgba(34,211,238,0.04)";cx.roundRect(0,0,256,64,8);cx.fill();
  cx.strokeStyle="rgba(34,211,238,0.06)";cx.lineWidth=1;
  for(var i=0;i<8;i++){cx.beginPath();cx.moveTo(i*32,0);cx.lineTo(i*32,64);cx.stroke();}
  cx.fillStyle="#"+clr.toString(16).padStart(6,"0");cx.font="bold 14px monospace";cx.textAlign="left";cx.textBaseline="middle";
  cx.fillText(h,16,22);cx.font="10px monospace";cx.fillStyle="rgba(255,255,255,0.35)";
  cx.fillText("SHA-256 \u25cf "+Math.floor(Math.random()*999999)+" nonce",16,46);
  return new THREE.CanvasTexture(c);
}
for(var i=0;i<BC;i++){
  var a=(i/(BC-1))*PI*0.8-PI*0.4;
  var x=Math.sin(a)*5.5,y=1.5+Math.cos(a*0.8)*2.2,z=-1.5-Math.cos(a)*1.5;
  var grp=new THREE.Group();
  var clr=i%2===0?C.blue:C.violet;
  var shell=new THREE.Mesh(new THREE.BoxGeometry(1.6,1.0,1.0),new THREE.MeshPhysicalMaterial({color:clr,transparent:true,opacity:0,roughness:0.1,metalness:0.0,clearcoat:0.7,clearcoatRoughness:0.05,side:THREE.BackSide,envMapIntensity:0.4}));shell.position.z=-0.04;grp.add(shell);
  var body=new THREE.Mesh(new THREE.BoxGeometry(1.3,0.7,0.7),new THREE.MeshPhysicalMaterial({color:clr,transparent:true,opacity:0,roughness:0.2,metalness:0.05,clearcoat:0.5,emissive:clr,emissiveIntensity:0.05}));grp.add(body);
  var edge=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(1.32,0.72,0.72)),new THREE.LineBasicMaterial({color:clr===C.blue?C.pinkL:C.blueL,transparent:true,opacity:0,blending:THREE.AdditiveBlending}));grp.add(edge);
  var dtMat=new THREE.MeshBasicMaterial({map:mkBlockTex("0x"+(i*123456).toString(16)+"...",clr),transparent:true,opacity:0,side:THREE.DoubleSide});
  var dtPlane=new THREE.Mesh(new THREE.PlaneGeometry(1.0,0.5),dtMat);dtPlane.position.set(0,0,0.36);grp.add(dtPlane);
  var ring=new THREE.Mesh(new THREE.RingGeometry(0.7,0.8,24),new THREE.MeshBasicMaterial({color:C.blueL,transparent:true,opacity:0,side:THREE.DoubleSide,blending:THREE.AdditiveBlending}));ring.rotation.x=-PI/2;ring.position.y=-0.36;grp.add(ring);
  var dgs=[];
  for(var j=0;j<12;j++){
    var dMat=new THREE.MeshBasicMaterial({color:Math.random()>0.5?C.cyan:C.violet,transparent:true,opacity:0});
    var dMesh=new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6),dMat);
    var da=Math.random()*TAU,dr=0.6+Math.random()*0.4,dyO=(Math.random()-0.5)*0.7;
    dMesh.position.set(Math.cos(da)*dr,dyO,Math.sin(da)*dr);
    dMesh.userData={angle:da,rad:dr,dy:dyO,speed:0.3+Math.random()*0.5,phase:Math.random()*TAU};grp.add(dMesh);dgs.push(dMesh);
  }
  grp.position.set(x,y,z);grp.rotation.y=-a*0.2;bcG.add(grp);bcB.push({group:grp,body:body,shell:shell,edge:edge,ring:ring,dt:dtPlane,dtMat:dtMat,dgs:dgs,clr:clr,a:a});
  if(i<BC-1){
    var na=((i+1)/(BC-1))*PI*0.8-PI*0.4;
    var nx=Math.sin(na)*5.5,ny=1.5+Math.cos(na*0.8)*2.2,nz=-1.5-Math.cos(na)*1.5;
    var dx=nx-x,dy=ny-y,dz=nz-z;var len=Math.sqrt(dx*dx+dy*dy+dz*dz);
    var beam=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,len,6,1,true),new THREE.MeshBasicMaterial({color:C.blueL,transparent:true,opacity:0,blending:THREE.AdditiveBlending,side:THREE.DoubleSide}));beam.position.set((x+nx)/2,(y+ny)/2,(z+nz)/2);beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(dx,dy,dz).normalize());bcG.add(beam);bcB[i].beam=beam;
  }
}
var bcPC=300;var bcPP=new Float32Array(bcPC*3);var bcPPh=new Float32Array(bcPC);
for(var i=0;i<bcPC;i++){bcPPh[i]=Math.random()*TAU;bcPP[i*3]=0;bcPP[i*3+1]=0;bcPP[i*3+2]=0;}
var bcPG=new THREE.BufferGeometry();bcPG.setAttribute("position",new THREE.BufferAttribute(bcPP,3));
var bcPM=new THREE.PointsMaterial({color:C.blueL,size:0.06,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
var bcP=new THREE.Points(bcPG,bcPM);bcG.add(bcP);
var bcDigC=60;var bcDigPos=new Float32Array(bcDigC*3);var bcDigPh=new Float32Array(bcDigC);
for(var i=0;i<bcDigC;i++){bcDigPh[i]=Math.random()*TAU;bcDigPos[i*3]=(Math.random()-0.5)*8;bcDigPos[i*3+1]=1+Math.random()*4;bcDigPos[i*3+2]=-2+(Math.random()-0.5)*3;}
var bcDigG=new THREE.BufferGeometry();bcDigG.setAttribute("position",new THREE.BufferAttribute(bcDigPos,3));
var bcDigM=new THREE.PointsMaterial({color:C.cyan,size:0.04,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
var bcDigP=new THREE.Points(bcDigG,bcDigM);bcG.add(bcDigP);
var merkleG=new THREE.Group();scene.add(merkleG);
function mkMerkleTree(){
  var g=new THREE.Group();var nodes=[];
  for(var i=0;i<8;i++){var leaf=new THREE.Mesh(new THREE.CircleGeometry(0.08,6),new THREE.MeshBasicMaterial({color:C.emerald,transparent:true,opacity:0,side:THREE.DoubleSide}));leaf.position.set((i-3.5)*0.35,0,0);g.add(leaf);nodes.push(leaf);}
  for(var i=0;i<4;i++){var parent=new THREE.Mesh(new THREE.CircleGeometry(0.1,6),new THREE.MeshBasicMaterial({color:C.blue,transparent:true,opacity:0,side:THREE.DoubleSide}));parent.position.set((i-1.5)*0.7,0.5,0);g.add(parent);nodes.push(parent);for(var j=0;j<2;j++){var pts=[new THREE.Vector3(nodes[i*2+j].position.x,0,0),new THREE.Vector3(parent.position.x,0.5,0)];var line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:C.blueL,transparent:true,opacity:0}));g.add(line);}}
  for(var i=0;i<2;i++){var parent=new THREE.Mesh(new THREE.CircleGeometry(0.12,6),new THREE.MeshBasicMaterial({color:C.violet,transparent:true,opacity:0,side:THREE.DoubleSide}));parent.position.set((i-0.5)*1.4,1.0,0);g.add(parent);nodes.push(parent);for(var j=0;j<2;j++){var ci=8+i*2+j;var pts=[new THREE.Vector3(nodes[ci].position.x,0.5,0),new THREE.Vector3(parent.position.x,1.0,0)];var line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:C.violet,transparent:true,opacity:0}));g.add(line);}}
  var root=new THREE.Mesh(new THREE.CircleGeometry(0.16,8),new THREE.MeshBasicMaterial({color:C.gold,transparent:true,opacity:0,side:THREE.DoubleSide}));root.position.set(0,1.5,0);g.add(root);nodes.push(root);
  for(var j=0;j<2;j++){var ci=12+j;var pts=[new THREE.Vector3(nodes[ci].position.x,1.0,0),new THREE.Vector3(0,1.5,0)];var line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:C.gold,transparent:true,opacity:0}));g.add(line);}
  return {g:g,nodes:nodes};
}
var merkle=mkMerkleTree();merkleG.add(merkle.g);merkleG.position.set(-1.5,3.5,-6);
var tokG=new THREE.Group();scene.add(tokG);
var tokRM=new THREE.MeshPhysicalMaterial({color:C.blue,metalness:0.5,roughness:0.15,transparent:true,opacity:0,emissive:C.blue,emissiveIntensity:0.3,side:THREE.DoubleSide});
var tokR=new THREE.Mesh(new THREE.TorusGeometry(3.5,0.08,16,48),tokRM);tokR.rotation.x=PI/2.8;tokR.position.y=2.5;tokG.add(tokR);
var tokIRM=new THREE.MeshPhysicalMaterial({color:C.violet,metalness:0.3,roughness:0.25,transparent:true,opacity:0,emissive:C.violet,emissiveIntensity:0.2,side:THREE.DoubleSide});
var tokIR=new THREE.Mesh(new THREE.TorusGeometry(2.4,0.05,12,36),tokIRM);tokIR.rotation.x=PI/2.8;tokIR.position.y=2.5;tokG.add(tokIR);
var tokDM=new THREE.MeshBasicMaterial({color:C.cyan,transparent:true,opacity:0,wireframe:true});
var tokDome=new THREE.Mesh(new THREE.SphereGeometry(3.8,12,8,0,TAU,0,PI/3),tokDM);tokDome.position.y=2.5;tokDome.scale.y=0.6;tokG.add(tokDome);
var tokPMat=new THREE.MeshPhysicalMaterial({color:C.cyan,transparent:true,opacity:0,emissive:C.cyan,emissiveIntensity:0.1});
for(var i=0;i<12;i++){var a=(i/12)*TAU;var pMm=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.08,1.0,6),tokPMat);pMm.position.set(Math.cos(a)*3.5,2.5,Math.sin(a)*3.5);tokG.add(pMm);}
var fracRing=new THREE.Mesh(new THREE.RingGeometry(1.5,2.5,32),new THREE.MeshBasicMaterial({color:C.emerald,transparent:true,opacity:0,side:THREE.DoubleSide,blending:THREE.AdditiveBlending}));fracRing.position.set(0,2.5,0);fracRing.rotation.x=PI/3;tokG.add(fracRing);
var fracRing2=new THREE.Mesh(new THREE.RingGeometry(1.0,1.8,24),new THREE.MeshBasicMaterial({color:C.gold,transparent:true,opacity:0,side:THREE.DoubleSide,blending:THREE.AdditiveBlending}));fracRing2.position.set(0,2.5,0);fracRing2.rotation.x=-PI/4;tokG.add(fracRing2);
var escrowG=new THREE.Group();scene.add(escrowG);
var escM=new THREE.MeshPhysicalMaterial({color:C.gold,metalness:0.5,roughness:0.15,transparent:true,opacity:0,emissive:C.gold,emissiveIntensity:0.2});
var escBox=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.0,0.8),escM);escBox.position.set(0,0.5,0);escrowG.add(escBox);
var escL=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(0.82,1.02,0.82)),new THREE.LineBasicMaterial({color:C.gold,transparent:true,opacity:0}));escrowG.add(escL);
escrowG.position.set(0,1.5,-6);
var tkCount=4000;var tkPos=new Float32Array(tkCount*3);var tkCol=new Float32Array(tkCount*3);var tkPh=new Float32Array(tkCount);var tkSP=new Float32Array(tkCount*3);var tkEP=new Float32Array(tkCount*3);
for(var i=0;i<tkCount;i++){
  var th=Math.random()*TAU,ph=Math.acos(2*Math.random()-1),r=0.3+Math.random()*1.5;
  tkPos[i*3]=Math.sin(ph)*Math.cos(th)*r;tkPos[i*3+1]=2.5+Math.sin(ph)*Math.sin(th)*r;tkPos[i*3+2]=Math.cos(ph)*r;
  tkSP[i*3]=tkPos[i*3];tkSP[i*3+1]=tkPos[i*3+1];tkSP[i*3+2]=tkPos[i*3+2];tkPh[i]=Math.random()*TAU;
  var c=Math.random();if(c<0.33){tkCol[i*3]=0.13;tkCol[i*3+1]=0.83;tkCol[i*3+2]=0.91;}else if(c<0.6){tkCol[i*3]=0.91;tkCol[i*3+1]=0.45;tkCol[i*3+2]=0.71;}else if(c<0.8){tkCol[i*3]=0.73;tkCol[i*3+1]=0.49;tkCol[i*3+2]=0.96;}else{tkCol[i*3]=0.2;tkCol[i*3+1]=0.83;tkCol[i*3+2]=0.6;}
  var a2=Math.random()*TAU,d2=6+Math.random()*3;tkEP[i*3]=Math.cos(a2)*d2;tkEP[i*3+1]=0.15+Math.random()*0.6;tkEP[i*3+2]=Math.sin(a2)*d2;
}
var tkg=new THREE.BufferGeometry();tkg.setAttribute("position",new THREE.BufferAttribute(tkPos,3));tkg.setAttribute("color",new THREE.BufferAttribute(tkCol,3));
var tkm=new THREE.PointsMaterial({size:0.05,transparent:true,opacity:0,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
var tkp=new THREE.Points(tkg,tkm);tokG.add(tkp);
var trG=new THREE.Group();scene.add(trG);
</script>
</body>
</html>
